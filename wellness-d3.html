<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFitnessDB – Wellness Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
  :root {
    --font-body: 'Satoshi', 'Inter', sans-serif;
    --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
    --text-sm:   clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
    --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
    --text-xl:   clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
    --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
    --space-6: 1.5rem; --space-8: 2rem;
    --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem;
    --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    --c-bg-top:#0A0E1A; --c-bg-mid:#0D1525; --c-bg-bot:#0F1C30;
    --c-surface:#131d30; --c-divider:#1E2A40; --c-label:#6B7A99;
    --c-label-dim:#3A4A66; --c-hrv:#00D4C8; --c-rhr:#FF5A6E;
    --c-sleep:#7B9EFF; --c-good:#00E5A0; --c-bad:#FF5A6E;
    --c-gold:#F5C842; --c-grid:#1A2335; --c-text:#C8D4EC;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html { -webkit-font-smoothing:antialiased; }
  body {
    min-height:100dvh; font-family:var(--font-body); font-size:var(--text-base);
    background:var(--c-bg-top); color:var(--c-text);
    display:flex; align-items:center; justify-content:center;
    padding:var(--space-8) var(--space-4);
  }
  .widget {
    width:min(420px,100%);
    background:linear-gradient(135deg,var(--c-bg-top),var(--c-bg-mid),var(--c-bg-bot));
    border:1px solid var(--c-divider); border-radius:var(--radius-xl);
    padding:var(--space-4) var(--space-4) var(--space-3);
    box-shadow:0 8px 40px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.4);
    position:relative; overflow:hidden;
  }
  .widget::before {
    content:''; position:absolute; top:-60px; right:-60px;
    width:200px; height:200px;
    background:radial-gradient(circle,rgba(0,212,200,.07) 0%,transparent 70%);
    pointer-events:none;
  }
  .title-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-3); }
  .title-row .brand { font-size:var(--text-xs); font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--c-label-dim); }
  .title-row .date-label { font-size:var(--text-xs); color:var(--c-label-dim); letter-spacing:.05em; text-transform:uppercase; }
  .metrics-row { display:flex; align-items:stretch; justify-content:space-between; margin-bottom:var(--space-3); }
  .metric-divider { width:1px; background:var(--c-divider); align-self:stretch; margin:0 var(--space-2); flex-shrink:0; }
  .metric-block { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .metric-icon-row { display:flex; align-items:center; gap:4px; font-size:var(--text-xs); font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
  .metric-arrow { font-size:var(--text-xs); font-weight:700; line-height:1; transition:color var(--transition-interactive); }
  .metric-arrow.good { color:var(--c-good); }
  .metric-arrow.bad  { color:var(--c-bad);  }
  .metric-value-row { display:flex; align-items:baseline; gap:3px; }
  .metric-value { font-size:var(--text-xl); font-weight:700; line-height:1; font-variant-numeric:tabular-nums lining-nums; transition:color var(--transition-interactive); }
  .metric-unit { font-size:var(--text-xs); color:var(--c-label); align-self:flex-end; padding-bottom:2px; }
  .chart-wrap { width:100%; position:relative; }
  #chart svg { display:block; width:100%; overflow:visible; }
  .footer-row { display:flex; align-items:center; justify-content:space-between; margin-top:var(--space-2); flex-wrap:wrap; gap:var(--space-2); }
  .legend { display:flex; align-items:center; gap:var(--space-3); }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:var(--text-xs); color:var(--c-label-dim); }
  .legend-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .sync-label { font-size:var(--text-xs); color:var(--c-gold); }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  .skeleton {
    background:linear-gradient(90deg,var(--c-surface) 25%,var(--c-divider) 50%,var(--c-surface) 75%);
    background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite; border-radius:var(--radius-md);
  }
  .skeleton-value { width:60px; height:36px; display:inline-block; }
  .skeleton-chart { width:100%; height:82px; border-radius:var(--radius-md); }
  .error-state { display:flex; flex-direction:column; align-items:center; gap:var(--space-3); padding:var(--space-8); text-align:center; }
  .error-state .icon { font-size:2rem; }
  .error-state p { font-size:var(--text-sm); color:var(--c-rhr); max-width:28ch; }
</style>
</head>
<body>
<div class="widget">
  <div class="title-row">
    <span class="brand">Wellness</span>
    <span class="date-label" id="date-label">Loading…</span>
  </div>
  <div class="metrics-row">
    <div class="metric-block">
      <div class="metric-icon-row"><span style="color:var(--c-hrv)">HRV</span><span class="metric-arrow" id="hrv-arrow"></span></div>
      <div class="metric-value-row"><span class="metric-value skeleton skeleton-value" id="hrv-val"></span><span class="metric-unit">ms</span></div>
    </div>
    <div class="metric-divider"></div>
    <div class="metric-block">
      <div class="metric-icon-row"><span style="color:var(--c-rhr)">RHR</span><span class="metric-arrow" id="rhr-arrow"></span></div>
      <div class="metric-value-row"><span class="metric-value skeleton skeleton-value" id="rhr-val"></span><span class="metric-unit">bpm</span></div>
    </div>
    <div class="metric-divider"></div>
    <div class="metric-block">
      <div class="metric-icon-row"><span style="color:var(--c-sleep)">Sleep</span><span class="metric-arrow" id="sleep-arrow"></span></div>
      <div class="metric-value-row"><span class="metric-value skeleton skeleton-value" id="sleep-val"></span></div>
    </div>
  </div>
  <div class="chart-wrap"><div id="chart" class="skeleton skeleton-chart"></div></div>
  <div class="footer-row">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--c-hrv)"></div>HRV</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--c-rhr)"></div>RHR</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--c-sleep)"></div>Sleep</div>
    </div>
    <span class="sync-label" id="sync-label"></span>
  </div>
</div>

<script>
const SUPABASE_URL="https://krgbagjignvbnrgybdos.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtyZ2JhZ2ppZ252Ym5yZ3liZG9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNjAxNjUsImV4cCI6MjA5MzgzNjE2NX0.CJLjj8rxGrgftTHoNNMSCurHEqqzh6j1aljWWJUCfg4";

function localDateStr(daysAgo=0){const d=new Date();d.setDate(d.getDate()-daysAgo);return d.toISOString().slice(0,10);}
function secsToHM(s){return{h:Math.floor(s/3600),m:Math.floor((s%3600)/60)};}
function formatSyncDate(u){if(!u)return"";const d=new Date(u);return"\u21BA "+d.toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit",year:"2-digit"})+" "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});}

async function fetchWellness(){
  const since=localDateStr(9);
  const url=`${SUPABASE_URL}/rest/v1/wellness_daily?select=date,resting_hr,hrv_last_night,sleep_duration_s,updated_at&date=gte.${since}&order=date.asc`;
  const res=await fetch(url,{headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":`Bearer ${SUPABASE_ANON_KEY}`}});
  if(!res.ok)throw new Error(`HTTP ${res.status}`);
  const data=await res.json();
  if(!data||data.length===0)throw new Error("No wellness data.");
  return data;
}

function drawChart(rows){
  const container=document.getElementById("chart");
  container.classList.remove("skeleton","skeleton-chart");
  container.innerHTML="";
  const W=container.clientWidth||360,H=88;
  const pT=6,pB=20,pL=2,pR=2;
  const innerW=W-pL-pR,innerH=H-pT-pB,n=rows.length;

  const svg=d3.select("#chart").append("svg")
    .attr("viewBox",`0 0 ${W} ${H}`)
    .attr("preserveAspectRatio","xMidYMid meet")
    .style("overflow","visible");

  const xScale=i=>pL+(i+0.5)*(innerW/n);
  const sleepVals=rows.map(r=>r.sleep_duration_s?+r.sleep_duration_s:null);
  const rhrVals=rows.map(r=>r.resting_hr?+r.resting_hr:null);
  const hrvVals=rows.map(r=>r.hrv_last_night?+r.hrv_last_night:null);
  const validRhr=rhrVals.filter(Boolean),validHrv=hrvVals.filter(Boolean),validSleep=sleepVals.filter(Boolean);
  const sleepMax=d3.max(validSleep)*1.15;
  const yRhr=d3.scaleLinear().domain([d3.min(validRhr)-4,d3.max(validRhr)+4]).range([pT+innerH,pT]);
  const yHrv=d3.scaleLinear().domain([d3.min(validHrv)-3,d3.max(validHrv)+3]).range([pT+innerH,pT]);
  const barW=(innerW/n)*0.36;

  [0,0.5,1].forEach(t=>{
    svg.append("line").attr("x1",pL).attr("x2",W-pR)
      .attr("y1",pT+innerH*t).attr("y2",pT+innerH*t)
      .attr("stroke","#1A2335").attr("stroke-width",0.5).attr("opacity",0.8);
  });

  rows.forEach((r,i)=>{
    const sv=sleepVals[i]; if(!sv)return;
    const barH=(sv/sleepMax)*innerH,bx=xScale(i)-barW/2,by=pT+innerH-barH;
    svg.append("rect").attr("x",bx).attr("y",by).attr("width",barW).attr("height",barH).attr("fill","#7B9EFF").attr("opacity",.18).attr("rx",2);
    svg.append("rect").attr("x",bx).attr("y",by).attr("width",barW).attr("height",Math.min(barH*.22,4)).attr("fill","#7B9EFF").attr("opacity",.45).attr("rx",1);
  });

  const rhrPts=rows.map((r,i)=>rhrVals[i]!==null?{x:xScale(i),y:yRhr(rhrVals[i])}:null).filter(Boolean);
  if(rhrPts.length>=2){
    svg.append("path").datum(rhrPts).attr("d",d3.line().x(d=>d.x).y(d=>d.y))
      .attr("fill","none").attr("stroke","#FF5A6E").attr("stroke-width",1.8)
      .attr("stroke-dasharray","3.5,2.5").attr("opacity",.85);
    rhrPts.forEach(pt=>svg.append("circle").attr("cx",pt.x).attr("cy",pt.y).attr("r",2.5).attr("fill","#FF5A6E"));
  }

  const hrvPts=rows.map((r,i)=>hrvVals[i]!==null?{x:xScale(i),y:yHrv(hrvVals[i])}:null).filter(Boolean);
  if(hrvPts.length>=2){
    const line=d3.line().x(d=>d.x).y(d=>d.y).curve(d3.curveLinear);
    svg.append("path").datum(hrvPts).attr("d",line).attr("fill","none").attr("stroke","#00D4C8").attr("stroke-width",7).attr("opacity",.18).attr("stroke-linecap","round");
    const solidPath=svg.append("path").datum(hrvPts).attr("d",line).attr("fill","none").attr("stroke","#00D4C8").attr("stroke-width",2.2).attr("stroke-linecap","round").attr("stroke-linejoin","round");
    const len=solidPath.node().getTotalLength();
    solidPath.attr("stroke-dasharray",len).attr("stroke-dashoffset",len)
      .transition().duration(900).ease(d3.easeCubicOut).attr("stroke-dashoffset",0);
    const last=hrvPts[hrvPts.length-1];
    svg.append("circle").attr("cx",last.x).attr("cy",last.y).attr("r",7).attr("fill","#00D4C8").attr("opacity",.22);
    svg.append("circle").attr("cx",last.x).attr("cy",last.y).attr("r",4).attr("fill","#00D4C8");
    svg.append("circle").attr("cx",last.x).attr("cy",last.y).attr("r",1.8).attr("fill","#fff");
  }

  const todayStr=localDateStr(0);
  rows.forEach((r,i)=>{
    const d=new Date(r.date+"T12:00:00");
    const lbl=String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");
    svg.append("text").attr("x",xScale(i)).attr("y",H-4).attr("text-anchor","middle")
      .attr("font-size","7px").attr("font-family","Satoshi,Inter,sans-serif")
      .attr("fill",r.date===todayStr?"#00D4C8":"#3A4A66").text(lbl);
  });

  const tooltip=d3.select("body").selectAll(".w-tt").data([1]).join("div").attr("class","w-tt")
    .style("position","fixed").style("pointer-events","none").style("opacity","0")
    .style("background","#131d30").style("border","1px solid #1E2A40").style("border-radius","8px")
    .style("padding","8px 12px").style("font-size","12px").style("font-family","Satoshi,Inter,sans-serif")
    .style("color","#C8D4EC").style("z-index","9999").style("line-height","1.6").style("min-width","110px")
    .style("box-shadow","0 4px 20px rgba(0,0,0,.5)").style("transition","opacity 120ms ease");

  svg.append("rect").attr("x",pL).attr("y",pT).attr("width",innerW).attr("height",innerH)
    .attr("fill","transparent").attr("cursor","crosshair")
    .on("mousemove",function(event){
      const[mx]=d3.pointer(event,this);
      const idx=Math.max(0,Math.min(n-1,Math.round((mx-pL)/(innerW/n)-0.5)));
      const r=rows[idx];
      const hv=r.hrv_last_night?(+r.hrv_last_night).toFixed(1):"—";
      const rv=r.resting_hr||"—";
      const sv=r.sleep_duration_s?(()=>{const{h,m}=secsToHM(+r.sleep_duration_s);return h+"h"+String(m).padStart(2,"0");})():"—";
      const dl=new Date(r.date+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
      tooltip.style("opacity","1").style("left",(event.clientX+12)+"px").style("top",(event.clientY-10)+"px")
        .html(`<div style="color:#6B7A99;font-size:11px;margin-bottom:4px">${dl}</div><div><span style="color:#00D4C8">HRV</span> ${hv} ms</div><div><span style="color:#FF5A6E">RHR</span> ${rv} bpm</div><div><span style="color:#7B9EFF">Sleep</span> ${sv}</div>`);
    }).on("mouseleave",()=>tooltip.style("opacity","0"));
}

function renderMetrics(rows){
  const todayStr=localDateStr(0),yestStr=localDateStr(1);
  const today=rows.find(r=>r.date===todayStr)||rows[rows.length-1];
  const yest=rows.find(r=>r.date===yestStr)||(rows.length>=2?rows[rows.length-2]:null);
  const hrv=today?parseFloat(today.hrv_last_night):null;
  const hrvPrev=yest?parseFloat(yest.hrv_last_night):null;
  const rhr=today?parseInt(today.resting_hr):null;
  const rhrPrev=yest?parseInt(yest.resting_hr):null;
  const sleepS=today?parseInt(today.sleep_duration_s):null;
  const sleepSP=yest?parseInt(yest.sleep_duration_s):null;
  const UP="\u2191",DOWN="\u2193";
  const hrvDir=(hrv&&hrvPrev&&!isNaN(hrv)&&!isNaN(hrvPrev))?(hrv>=hrvPrev?UP:DOWN):null;
  const rhrDir=(rhr&&rhrPrev)?(rhr>rhrPrev?UP:DOWN):null;
  const sleepDir=(sleepS&&sleepSP)?(sleepS>=sleepSP?UP:DOWN):null;
  const cHRV=(!hrvDir||hrvDir===UP)?"#00D4C8":"#FF5A6E";
  const cRHR="#FF5A6E";
  const cSleep=(!sleepDir||sleepDir===UP)?"#7B9EFF":"#FF5A6E";
  const sleepHM=sleepS?secsToHM(sleepS):null;
  const sleepStr=sleepHM?`${sleepHM.h}h${String(sleepHM.m).padStart(2,"0")}`:"—";
  const hrvStr=(hrv!==null&&!isNaN(hrv))?hrv.toFixed(1):"—";
  const rhrStr=rhr!==null?String(rhr):"—";

  function setMetric(vId,aId,val,color,dir,arrowIsGood){
    const el=document.getElementById(vId);
    el.classList.remove("skeleton","skeleton-value");
    el.textContent=val; el.style.color=color;
    const ae=document.getElementById(aId);
    if(dir){ae.textContent=dir;ae.className="metric-arrow "+(arrowIsGood?(dir===UP?"good":"bad"):(dir===DOWN?"good":"bad"));}
  }
  setMetric("hrv-val","hrv-arrow",hrvStr,cHRV,hrvDir,true);
  setMetric("rhr-val","rhr-arrow",rhrStr,cRHR,rhrDir,false);
  setMetric("sleep-val","sleep-arrow",sleepStr,cSleep,sleepDir,true);

  const now=new Date();
  document.getElementById("date-label").textContent=now.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}).toUpperCase();
  let syncTime=null;
  rows.forEach(r=>{if(r.updated_at&&(!syncTime||r.updated_at>syncTime))syncTime=r.updated_at;});
  document.getElementById("sync-label").textContent=syncTime?formatSyncDate(syncTime):"";
}

function showError(msg){
  document.getElementById("chart").innerHTML=`<div class="error-state"><span class="icon">\u26A0\uFE0F</span><p>${msg}</p></div>`;
  ["hrv-val","rhr-val","sleep-val"].forEach(id=>{const el=document.getElementById(id);el.classList.remove("skeleton","skeleton-value");el.textContent="—";el.style.color="#6B7A99";});
}

(async function(){
  try{const rows=await fetchWellness();renderMetrics(rows);drawChart(rows.slice(-7));}
  catch(e){showError(e.message);}
})();
</script>
</body>
</html>
